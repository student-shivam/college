services:
  - type: web
    name: predictive-maintenance-backend
    env: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: ML_API_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

